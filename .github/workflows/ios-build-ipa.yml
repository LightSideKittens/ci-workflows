name: iOS Build IPA (Reusable)

on:
  workflow_call:
    inputs:
      xcode_project_path:
        description: 'Path to .xcodeproj file'
        required: true
        type: string
      output_name:
        description: 'Output IPA filename'
        required: false
        type: string
        default: 'App.ipa'
    secrets:
      GH_PAT:
        required: true
      MATCH_PASSWORD:
        required: true
      MATCH_GIT_URL:
        required: true
      TEAM_ID:
        required: true
      APP_IDENTIFIER:
        required: true
      APP_STORE_CONNECT_KEY_ID:
        required: true
      APP_STORE_CONNECT_ISSUER_ID:
        required: true
      APP_STORE_CONNECT_API_KEY:
        required: true
    outputs:
      ipa_path:
        description: 'Path to built IPA'
        value: ${{ jobs.build.outputs.ipa_path }}

jobs:
  build:
    runs-on: macos-14
    timeout-minutes: 60
    outputs:
      ipa_path: ${{ steps.build.outputs.ipa_path }}

    steps:
      - name: Checkout ci-workflows
        uses: actions/checkout@v4
        with:
          repository: LightSideKittens/ci-workflows
          token: ${{ secrets.GH_PAT }}
          sparse-checkout: fastlane
          path: ci-workflows

      - name: Setup Ruby
        uses: ruby/setup-ruby@v1
        with:
          ruby-version: '3.2'
          bundler-cache: true
          working-directory: ci-workflows/fastlane

      - name: Configure Git Credentials
        run: |
          git config --global credential.helper store
          echo "https://x-access-token:${{ secrets.GH_PAT }}@github.com" > ~/.git-credentials

      - name: Fix Xcode project permissions
        run: |
          PROJECT_DIR=$(dirname "${{ inputs.xcode_project_path }}")
          find "$PROJECT_DIR" -name "*.sh" -exec chmod +x {} \; 2>/dev/null || true
          find "$PROJECT_DIR" -name "usymtool*" -exec chmod +x {} \; 2>/dev/null || true

      - name: Build IPA
        id: build
        env:
          MATCH_PASSWORD: ${{ secrets.MATCH_PASSWORD }}
          MATCH_GIT_URL: ${{ secrets.MATCH_GIT_URL }}
          APP_IDENTIFIER: ${{ secrets.APP_IDENTIFIER }}
          TEAM_ID: ${{ secrets.TEAM_ID }}
          APP_STORE_CONNECT_API_KEY_KEY_ID: ${{ secrets.APP_STORE_CONNECT_KEY_ID }}
          APP_STORE_CONNECT_API_KEY_ISSUER_ID: ${{ secrets.APP_STORE_CONNECT_ISSUER_ID }}
          APP_STORE_CONNECT_API_KEY_KEY: ${{ secrets.APP_STORE_CONNECT_API_KEY }}
        run: |
          cd ci-workflows/fastlane
          bundle install --quiet
          bundle exec fastlane build_ipa \
            xcode_project:"$GITHUB_WORKSPACE/${{ inputs.xcode_project_path }}" \
            output_name:"${{ inputs.output_name }}" \
            output_dir:"$GITHUB_WORKSPACE"

          echo "ipa_path=$GITHUB_WORKSPACE/${{ inputs.output_name }}" >> $GITHUB_OUTPUT

      - name: Verify IPA
        run: |
          IPA="${{ steps.build.outputs.ipa_path }}"
          echo "IPA size: $(du -h "$IPA" | cut -f1)"

          # Verify signature
          unzip -q "$IPA" -d /tmp/ipa_verify
          codesign --verify --deep --verbose /tmp/ipa_verify/Payload/*.app || echo "Signature verification completed"
          rm -rf /tmp/ipa_verify
