name: iOS Create Certificate (Once per company)

on:
  workflow_dispatch:
    inputs:
      force_renew:
        description: 'Force renew (only if expired)'
        type: boolean
        default: false

jobs:
  create:
    runs-on: macos-14
    timeout-minutes: 15
    steps:
      - name: Checkout ci-workflows
        uses: actions/checkout@v4

      - name: Setup Ruby
        uses: ruby/setup-ruby@v1
        with:
          ruby-version: '3.2'
          bundler-cache: true
          working-directory: fastlane

      - name: Configure Git Credentials
        run: |
          git config --global credential.helper store
          echo "https://x-access-token:${{ secrets.GH_PAT }}@github.com" > ~/.git-credentials

      - name: Create Distribution Certificate
        env:
          MATCH_PASSWORD: ${{ secrets.MATCH_PASSWORD }}
          MATCH_GIT_URL: ${{ secrets.MATCH_GIT_URL }}
          TEAM_ID: ${{ secrets.TEAM_ID }}
          APP_STORE_CONNECT_API_KEY_KEY_ID: ${{ secrets.APP_STORE_CONNECT_KEY_ID }}
          APP_STORE_CONNECT_API_KEY_ISSUER_ID: ${{ secrets.APP_STORE_CONNECT_ISSUER_ID }}
          APP_STORE_CONNECT_API_KEY_KEY: ${{ secrets.APP_STORE_CONNECT_API_KEY }}
        run: |
          cd fastlane
          bundle install --quiet
          bundle exec fastlane create_certificate force:${{ inputs.force_renew }}

      - name: Summary
        run: |
          echo "## ✅ iOS Distribution Certificate Created" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "Certificate stored in: \`${{ secrets.MATCH_GIT_URL }}\`" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "Next: Run **Setup iOS Profile** in your app repository." >> $GITHUB_STEP_SUMMARY
